spring.application.name=poc

# Admin-configured global fee percentage — expressed as decimal (0.01 = 1%, 0.015 = 1.5%)
fee.percentage=0.01

# FX spread percentage for cross-currency Me2Me transfers (0.005 = 0.5%)
fee.spread.percentage=0.005

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/feedb
spring.datasource.username=postgres
spring.datasource.password=251044
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.mvc.problemdetails.enabled=true
